name: Nix Flake Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Third-party actions are pinned to full commit SHAs so a compromised
# upstream ref cannot execute arbitrary code in CI.
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14

      - name: Run flake check
        run: nix flake check

      - name: Check formatting
        run: nix fmt -- --fail-on-change

  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        host:
          - arcadia
          - argus
          - minerva
          - nubes
          - caelus
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14

      - name: Build ${{ matrix.host }} configuration (dry-run)
        run: nix build .#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel --dry-run
